name: Minecraft heavy validation

on:
  push:
    branches: [main]
  schedule:
    - cron: '23 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  loaders-and-runtime:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: terminal/web-ui/package-lock.json
      - uses: gradle/actions/setup-gradle@v4
      - name: Warm Gradle wrapper with network retry
        shell: pwsh
        run: |
          $exitCode = 1
          foreach ($attempt in 1..3) {
            ./gradlew.bat --version
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 0) { break }
            if ($attempt -lt 3) { Start-Sleep -Seconds 10 }
          }
          if ($exitCode -ne 0) { exit $exitCode }
      - name: Build all supported Loader artifacts
        shell: pwsh
        run: ./gradlew.bat buildPlatforms --stacktrace
      - name: Launch dedicated servers
        shell: pwsh
        run: ./gradlew.bat launchTest --stacktrace
      - name: Run all Loader GameTests
        shell: pwsh
        run: ./gradlew.bat gameTest --stacktrace
      - name: Run Runtime/Fabric end-to-end test
        shell: pwsh
        run: ./gradlew.bat runtimeFabricE2E --stacktrace
      - name: Run persistence restart test
        shell: pwsh
        run: ./gradlew.bat persistenceRestartTest --stacktrace
      - name: Run Runtime multi-profile test
        shell: pwsh
        run: ./gradlew.bat runtimeMultiProfileTest --stacktrace
      - name: Upload safe test reports and logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-heavy-failure-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            **/build/reports/tests/
            **/build/test-results/
            minecraft/*/build/launch-test/server/logs/
            minecraft/*/build/gametest/logs/
            build/e2e-runtime/evidence/
            build/reports/problems/
