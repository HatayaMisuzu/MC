name: PR fast checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shared-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: terminal/web-ui/package-lock.json
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile, unit, component and policy checks
        run: ./gradlew test check --stacktrace
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-fast-test-reports
          if-no-files-found: ignore
          retention-days: 7
          path: |
            **/build/reports/tests/
            **/build/test-results/
            build/reports/problems/
