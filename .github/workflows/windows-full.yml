name: Windows terminal validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terminal-package:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and execute clean terminal package
        shell: pwsh
        run: >-
          ./gradlew.bat verifyTerminalPackage tuiIntegrationTest rootLauncherTest
          releaseStarterTest runtimeMultiProfileTest runtimeDisabledLaunchTest --stacktrace
      - name: Upload safe reports and launch logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-terminal-failure-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            **/build/reports/tests/
            **/build/test-results/
            minecraft/*/build/launch-test/server/logs/
            build/reports/problems/

