name: Windows terminal validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terminal-package:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: terminal/web-ui/package-lock.json
      - uses: gradle/actions/setup-gradle@v4
      - name: Warm Gradle wrapper with network retry
        shell: pwsh
        run: |
          $exitCode = 1
          foreach ($attempt in 1..3) {
            ./gradlew.bat --version
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 0) { break }
            if ($attempt -lt 3) { Start-Sleep -Seconds 10 }
          }
          if ($exitCode -ne 0) { exit $exitCode }
      - name: Install Chromium for browser end-to-end tests
        shell: pwsh
        working-directory: terminal/web-ui
        run: |
          npm ci --no-audit --no-fund
          npx playwright install chromium
      - name: Build browser end-to-end backend and Fabric artifact
        shell: pwsh
        run: >-
          ./gradlew.bat webBuild :terminal:terminal-app:installDist
          :runtime:runtime-app:installDist build-fabric-1.21.1 --stacktrace
      - name: Run the full browser product path
        shell: pwsh
        working-directory: terminal/web-ui
        env:
          MCAC_E2E_PREBUILT: '1'
        run: npm run e2e
      - name: Build and execute clean HTML terminal package
        shell: pwsh
        run: >-
          ./gradlew.bat verifyTerminalPackage tuiIntegrationTest rootLauncherTest
          releaseStarterTest htmlTerminalStartTest runtimeMultiProfileTest
          runtimeDisabledLaunchTest releaseGoldenPathTest --stacktrace
      - name: Upload verified RC candidate
        uses: actions/upload-artifact@v4
        with:
          name: mcac-rc-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            build/distributions/mcac-release.zip
            build/distributions/mcac-release.zip.sha256
            build/distributions/mcac-release/release-manifest.json
            build/distributions/mcac-release/sbom.spdx.json
      - name: Upload safe reports and launch logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-terminal-failure-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            **/build/reports/tests/
            **/build/test-results/
            minecraft/*/build/launch-test/server/logs/
            build/reports/problems/
