name: Windows terminal validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terminal-package:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: terminal/web-ui/package-lock.json
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Chromium for browser end-to-end tests
        shell: pwsh
        working-directory: terminal/web-ui
        run: |
          npm ci --no-audit --no-fund
          npx playwright install chromium
      - name: Run the full browser product path
        shell: pwsh
        working-directory: terminal/web-ui
        run: npm run e2e
      - name: Build and execute clean HTML terminal package
        shell: pwsh
        run: >-
          ./gradlew.bat verifyTerminalPackage tuiIntegrationTest rootLauncherTest
          releaseStarterTest htmlTerminalStartTest runtimeMultiProfileTest
          runtimeDisabledLaunchTest --stacktrace
      - name: Upload safe reports and launch logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-terminal-failure-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            **/build/reports/tests/
            **/build/test-results/
            minecraft/*/build/launch-test/server/logs/
            build/reports/problems/
