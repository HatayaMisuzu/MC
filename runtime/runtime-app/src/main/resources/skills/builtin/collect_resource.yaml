version: mcac-task-graph/1
id: builtin_collect_resource
inputs:
  item:
    type: registry_item
    required: true
  quantity:
    type: integer
    required: true
  allowPartial:
    type: boolean
    default: false
permissions:
  - COLLECT
root:
  id: collect
  type: call_tool
  tool: resource.collect
  permission: COLLECT
  arguments:
    item: ${inputs.item}
    quantity: ${inputs.quantity}
    allowPartial: ${inputs.allowPartial}
