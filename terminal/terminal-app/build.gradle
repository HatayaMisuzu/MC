plugins { id 'application' }
java { toolchain { languageVersion = JavaLanguageVersion.of(21) } }
tasks.withType(JavaCompile).configureEach { options.release = 21; options.encoding = 'UTF-8' }
application { mainClass = 'com.mccompanion.terminal.ControlTerminalMain'; applicationName = 'mcac' }
dependencies {
    implementation project(':terminal:launcher-api')
    implementation project(':terminal:launcher-generic')
    implementation project(':terminal:launcher-pcl2')
    implementation project(':terminal:launcher-hmcl')
    implementation project(':terminal:instance-probe')
    implementation project(':terminal:installer')
    implementation project(':terminal:diagnostics')
    implementation project(':terminal:runtime-supervisor')
    implementation 'info.picocli:picocli:4.7.7'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.3'
    annotationProcessor 'info.picocli:picocli-codegen:4.7.7'
    testImplementation platform('org.junit:junit-bom:5.12.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}
tasks.withType(Test).configureEach { useJUnitPlatform() }
